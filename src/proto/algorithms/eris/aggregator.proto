syntax = "proto3";

package eris;

import "algorithms/eris/common.proto";

message WeightSubmissionRequest {
    uint32 round = 1;
    repeated float weight = 2;
}


message WeightSubmissionResponse {
    optional Error error = 1;
}


message WeightUpdate {
    uint32 round = 1;
    uint32 contributors = 2;
    repeated float weight = 3;
}
