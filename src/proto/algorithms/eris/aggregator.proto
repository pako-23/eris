syntax = "proto3";

package eris;

import "algorithms/eris/common.proto";

service Aggregator {
    rpc SubmitWeights (FragmentWeights) returns (Empty) {}
}


message FragmentWeights {
    uint32 round = 1;
    repeated double weight = 2;
}

message WeightUpdate {
    uint32 round = 1;
    uint32 contributors = 2;
    repeated double weight = 3;
}
