version: '3.9'


services:
  coordinator:
    build:
      context: .
      dockerfile: Dockerfile
      target: coordinator
    hostname: coordinator
    healthcheck:
      test: ["CMD", "nc -z 127.0.0.1 5051"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 10s

  client-1:
    build:
      context: .
      dockerfile: Dockerfile
      target: client
    hostname: client-1

  client-2:
    build:
      context: .
      dockerfile: Dockerfile
      target: client
    hostname: client-2
